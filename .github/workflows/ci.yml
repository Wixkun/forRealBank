name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io

jobs:
  # ============ STEP 1: QUALITY CHECKS (Parallel) ============

  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérifier le formatage
        run: pnpm exec prettier --check .
        continue-on-error: true

      - name: Lancer le lint
        run: pnpm lint

      - name: Unit Tests API
        run: pnpm --filter api-nest test:unit
        continue-on-error: true

      - name: E2E Tests API
        run: pnpm --filter api-nest test:e2e

      - name: Tests Web
        run: pnpm --filter web-next test
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        continue-on-error: true

      - name: Coverage Summary
        run: echo "Coverage reporting configured for future unit tests"
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api-nest/coverage/
            apps/web-next/coverage/
          retention-days: 30

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Check CRITICAL vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)
          echo "CRITICAL vulnerabilities found: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found CRITICAL vulnerabilities!"
            jq '.Results[] | select(.Severity == "CRITICAL")' trivy-report.json
            exit 1
          fi
          echo "No CRITICAL vulnerabilities"

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            trivy-report.json
          retention-days: 30

  # ============ STEP 2: BUILD (Matrix) ============

  docker-build:
    name: Build ${{ matrix.image.name }} Image
    runs-on: ubuntu-latest
    needs:
      - lint-and-test
      - security-scan

    strategy:
      fail-fast: true
      matrix:
        image:
          - name: API
            dockerfile: ./apps/api-nest/Dockerfile
            tag-name: api
            build-args: ''

          - name: Web
            dockerfile: ./apps/web-next/Dockerfile
            tag-name: web
            build-args: |
              NEXT_PUBLIC_API_URL=http://api:3001/api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: forreal-${{ matrix.image.tag-name }}:${{ github.sha }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ STEP 3: TESTS (Parallel) ============

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: "Create .env file from GitHub Secrets"
        run: |
          cat > .env <<'EOF'
          # Database
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          
          # PgAdmin
          PGADMIN_DEFAULT_EMAIL=${{ secrets.PGADMIN_EMAIL }}
          PGADMIN_DEFAULT_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}
          
          # API
          PORT=3001
          NODE_ENV=development
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=15m
          JWT_ISSUER=forrealbank.auth
          JWT_AUDIENCE=forrealbank.api
          JWT_ALGO=HS256
          EOF

      - name: Start docker-compose
        run: docker compose up -d --build

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U forreal -d forrealbank 2>/dev/null; then
              echo "DB ready"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" == "200" ]; then
              echo "API ready"
              exit 0
            fi
            echo "Checking API... ($i/30)"
            sleep 2
          done
          echo "API failed to respond after 30 attempts"
          docker compose logs api
          exit 1

      - name: Run integration tests
        run: |
          # Health check
          curl -f http://localhost:3001/api/health || exit 1
          
          # Test register
          REGISTER_RESPONSE=$(curl -s -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"test-ci@forreal.bank","password":"TestPassword@123","firstName":"CI","lastName":"Test"}')
          echo "Register: $REGISTER_RESPONSE"
          
          # Test login
          LOGIN_RESPONSE=$(curl -s -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test-ci@forreal.bank","password":"TestPassword@123"}')
          echo "Login: $LOGIN_RESPONSE"
          
          # Verify both returned success
          echo "$REGISTER_RESPONSE" | grep -q "success" && echo "$LOGIN_RESPONSE" | grep -q "success" || exit 1

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs > docker-logs.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web-next exec playwright install --with-deps

      - name: "Create .env file from GitHub Secrets"
        run: |
          cat > .env <<'EOF'
          # Database
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          
          # PgAdmin
          PGADMIN_DEFAULT_EMAIL=${{ secrets.PGADMIN_EMAIL }}
          PGADMIN_DEFAULT_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}
          
          # API
          PORT=3001
          NODE_ENV=development
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=15m
          JWT_ISSUER=forrealbank.auth
          JWT_AUDIENCE=forrealbank.api
          JWT_ALGO=HS256
          EOF

      - name: Start docker-compose
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for services..."
          
          for i in {1..30}; do

            if docker compose exec -T db pg_isready -U forreal -d forrealbank >/dev/null 2>&1; then
              DB_OK="ok"
            else
              DB_OK="no"
            fi

            API_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
            WEB_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            
            # Accept 2xx or 3xx as successful for web (redirects are ok)
            WEB_OK="no"
            if [ "$WEB_CODE" -ge 200 ] && [ "$WEB_CODE" -lt 400 ]; then
              WEB_OK="ok"
            fi
            
            if [ "$DB_OK" = "ok" ] && [ "$API_CODE" = "200" ] && [ "$WEB_OK" = "ok" ]; then
              echo "All services ready"
              exit 0
            fi
            
            echo "  DB:$DB_OK API:$API_CODE WEB:$WEB_CODE ($i/30)"
            sleep 2
          done
          echo "Services failed to start properly"
          docker compose logs api
          exit 1

      - name: Run Playwright tests
        run: pnpm --filter web-next exec playwright test
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-next/playwright-report/
          retention-days: 30

      - name: Upload videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: apps/web-next/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ============ STEP 4: DEPLOY (Main only) ============

  docker-push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: ./apps/api-nest/Dockerfile
            build-args: ''

          - name: web
            dockerfile: ./apps/web-next/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=http://api:3001/api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ STEP 5: DEPLOY TO VPS (Main only) ============

  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/forRealBank || exit 1
            
            export DOCKER_USERNAME=${{ secrets.GHCR_USERNAME }}
            export DOCKER_PASSWORD=${{ secrets.GHCR_PASSWORD }}
            
            sudo -E bash deploy.sh

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Déploiement réussi en production!"
          else
            echo "Déploiement échoué!"
            exit 1
          fi