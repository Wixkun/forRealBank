name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  REGISTRY: ghcr.io

jobs:
  # ============ STEP 1: QUALITY CHECKS (Parallel) ============

  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérifier le formatage
        run: pnpm exec prettier --check .
        continue-on-error: true

      - name: Lancer le lint
        run: pnpm lint

      - name: Tests API (avec coverage)
        run: pnpm --filter api-nest test -- --coverage --coverage-reporters=json

      - name: Tests Web (avec coverage)
        run: pnpm --filter web-next test -- --coverage --coverage-reporters=json
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api-nest/coverage/coverage-final.json,./apps/web-next/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Check coverage thresholds
        run: |
          echo "Checking coverage thresholds..."
          
          API_OK=0
          if [ -f apps/api-nest/coverage/coverage-summary.json ]; then
            API_COVERAGE=$(jq '.total.lines.pct' apps/api-nest/coverage/coverage-summary.json)
            echo "API Coverage: ${API_COVERAGE}% (threshold: 75%)"
            if (( $(echo "$API_COVERAGE >= 75" | bc -l) )); then
              echo "API OK (passed)"
              API_OK=1
            else
              echo "API FAILED (below 75%)"
            fi
          fi
          
          WEB_OK=0
          if [ -f apps/web-next/coverage/coverage-summary.json ]; then
            WEB_COVERAGE=$(jq '.total.lines.pct' apps/web-next/coverage/coverage-summary.json)
            echo "Web Coverage: ${WEB_COVERAGE}% (threshold: 60%)"
            if (( $(echo "$WEB_COVERAGE >= 60" | bc -l) )); then
              echo "Web OK (passed)"
              WEB_OK=1
            else
              echo "Web needs improvement (continuing..)"
            fi
          fi
          
          if [ "$API_OK" -eq 0 ]; then
            exit 1
          fi

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api-nest/coverage/
            apps/web-next/coverage/
          retention-days: 30

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Check CRITICAL vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)
          echo "CRITICAL vulnerabilities found: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found CRITICAL vulnerabilities!"
            jq '.Results[] | select(.Severity == "CRITICAL")' trivy-report.json
            exit 1
          fi
          echo "No CRITICAL vulnerabilities"

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            trivy-report.json
          retention-days: 30

  # ============ STEP 2: BUILD (Matrix) ============

  docker-build:
    name: Build ${{ matrix.image.name }} Image
    runs-on: ubuntu-latest
    needs:
      - lint-and-test
      - security-scan

    strategy:
      fail-fast: true
      matrix:
        image:
          - name: API
            dockerfile: ./apps/api-nest/Dockerfile
            tag-name: api
            build-args: ''

          - name: Web
            dockerfile: ./apps/web-next/Dockerfile
            tag-name: web
            build-args: |
              NEXT_PUBLIC_API_URL=http://api:3001/api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: forreal-${{ matrix.image.tag-name }}:${{ github.sha }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ STEP 3: TESTS (Parallel) ============

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Start docker-compose
        run: docker compose up -d --build

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U forreal -d forrealbank 2>/dev/null; then
              echo "DB ready"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" == "200" ]; then
              echo "API ready"
              exit 0
            fi
            echo "Checking API... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Run integration tests
        run: docker compose exec -T api pnpm test

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs > docker-logs.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web-next exec playwright install --with-deps

      - name: Start docker-compose
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for services..."
          
          for i in {1..30}; do
            DB_OK=$(docker compose exec -T db pg_isready -U forreal -d forrealbank 2>/dev/null && echo "ok" || echo "no")
            API_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
            WEB_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            
            if [ "$DB_OK" = "ok" ] && [ "$API_CODE" == "200" ] && [ "$WEB_CODE" == "200" ]; then
              echo "All services ready"
              exit 0
            fi
            
            echo "  DB:$DB_OK API:$API_CODE WEB:$WEB_CODE ($i/30)"
            sleep 2
          done
          exit 1

      - name: Run Playwright tests
        run: pnpm --filter web-next exec playwright test
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-next/playwright-report/
          retention-days: 30

      - name: Upload videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: apps/web-next/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ============ STEP 4: DEPLOY (Main only) ============

  docker-push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs:
      - integration-tests
      - e2e-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: ./apps/api-nest/Dockerfile
            build-args: ''

          - name: web
            dockerfile: ./apps/web-next/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=http://api:3001/api

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max