name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  POSTGRES_USER: forreal
  POSTGRES_PASSWORD: forreal_ci_password
  POSTGRES_DB: forrealbank
  PGADMIN_DEFAULT_EMAIL: ci@forreal.bank
  PGADMIN_DEFAULT_PASSWORD: ci_pgadmin_password
  PORT: '3001'
  NODE_ENV: test
  DB_HOST: localhost
  DB_PORT: '5432'
  DB_USER: forreal
  DB_PASS: forreal_ci_password
  DB_NAME: forrealbank
  DATABASE_URL: postgres://forreal:forreal_ci_password@localhost:5432/forrealbank
  JWT_SECRET: ci_jwt_secret_minimum_32_chars_for_tests
  JWT_EXPIRES_IN: 15m
  JWT_ISSUER: forrealbank.auth
  JWT_AUDIENCE: forrealbank.api
  JWT_ALGO: HS256
  FRONTEND_ORIGIN: http://localhost:3000

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api-nest/coverage/
            apps/web-next/coverage/
          if-no-files-found: ignore
          retention-days: 30

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Block critical vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)
          echo "Critical vulnerabilities found: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            jq '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")' trivy-report.json
            exit 1
          fi

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            trivy-report.json
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - quality
      - security-scan

    strategy:
      fail-fast: true
      matrix:
        image:
          - name: api
            dockerfile: ./apps/api-nest/Dockerfile
            build-args: ''
          - name: web
            dockerfile: ./apps/web-next/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=https://for-real.cloud/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: forreal-${{ matrix.image.name }}:${{ github.sha }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
          PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
          PORT=${PORT}
          NODE_ENV=${NODE_ENV}
          DB_HOST=db
          DB_PORT=${DB_PORT}
          DB_USER=${DB_USER}
          DB_PASS=${DB_PASS}
          DB_NAME=${DB_NAME}
          DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@db:${DB_PORT}/${DB_NAME}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
          JWT_ISSUER=${JWT_ISSUER}
          JWT_AUDIENCE=${JWT_AUDIENCE}
          JWT_ALGO=${JWT_ALGO}
          FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
          EOF

      - name: Start docker-compose
        run: docker compose up -d --build db api web

      - name: Wait for API health
        run: |
          for i in {1..45}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API ready"
              exit 0
            fi
            echo "Waiting for API... $HTTP_CODE ($i/45)"
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Run integration checks
        run: |
          curl -f http://localhost:3001/api/health
          curl -f http://localhost:3001/api/metrics

          REGISTER_RESPONSE=$(curl -s -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"test-ci@forreal.bank","password":"TestPassword@123","firstName":"CI","lastName":"Test"}')
          echo "Register: $REGISTER_RESPONSE"

          docker compose exec -T db psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
            -c "UPDATE users SET email_verified = true, email_verified_at = now() WHERE email = 'test-ci@forreal.bank';"

          LOGIN_RESPONSE=$(curl -s -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test-ci@forreal.bank","password":"TestPassword@123"}')
          echo "Login: $LOGIN_RESPONSE"

          echo "$REGISTER_RESPONSE" | grep -q "success"
          echo "$LOGIN_RESPONSE" | grep -q "success"

      - name: Collect docker logs
        if: failure()
        run: docker compose logs > docker-logs.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: Optional E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    needs:
      - docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web-next exec playwright install --with-deps

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
          PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
          PORT=${PORT}
          NODE_ENV=${NODE_ENV}
          DB_HOST=db
          DB_PORT=${DB_PORT}
          DB_USER=${DB_USER}
          DB_PASS=${DB_PASS}
          DB_NAME=${DB_NAME}
          DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@db:${DB_PORT}/${DB_NAME}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
          JWT_ISSUER=${JWT_ISSUER}
          JWT_AUDIENCE=${JWT_AUDIENCE}
          JWT_ALGO=${JWT_ALGO}
          FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
          EOF

      - name: Start docker-compose
        run: docker compose up -d --build db api web

      - name: Wait for web
        run: |
          for i in {1..60}; do
            API_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || echo "000")
            WEB_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$API_CODE" = "200" ] && [ "$WEB_CODE" -ge 200 ] && [ "$WEB_CODE" -lt 400 ]; then
              echo "API and web ready"
              exit 0
            fi
            echo "Waiting... API=$API_CODE WEB=$WEB_CODE ($i/60)"
            sleep 2
          done
          docker compose logs api web
          exit 1

      - name: Run Playwright tests
        run: pnpm --filter web-next test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-next/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: apps/web-next/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  docker-push:
    name: Push Images
    runs-on: ubuntu-latest
    needs:
      - integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: ./apps/api-nest/Dockerfile
            build-args: ''
          - name: web
            dockerfile: ./apps/web-next/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=https://for-real.cloud/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/wixkun/forrealbank/${{ matrix.image.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/forrealbank || exit 1

            export GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            export GHCR_PASSWORD="${{ secrets.GHCR_PASSWORD }}"
            export IMAGE_TAG="${{ github.sha }}"

            chmod +x deploy.sh
            bash deploy.sh
