version: "3.9"
services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      # Swarm caveat: this bind path must exist on the node running the task.
      # With manager-only placement below, keep this file present on the manager host.
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_net
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 30s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      # TODO(secrets): migrate admin password to a Swarm secret.
      # Suggested target: GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    ports:
      # Temporary direct access for school setup before proxy exposure.
      # Optional later: remove this published port and route via Traefik.
      - target: 3000
        published: 3002
        protocol: tcp
        mode: ingress
    volumes:
      # Swarm caveat: this bind path must exist on the node running the task.
      # With manager-only placement below, keep this file present on the manager host.
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 30s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 128M

networks:
  monitoring_net:
    driver: overlay
    attachable: true
  # Reuse the app overlay network so Prometheus can scrape api:3001.
  # This network must already exist from the app stack deployment.
  app_net:
    external: true
    name: forrealbank_app_net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Optional service not included by default: pgAdmin.
# Keep monitoring stack focused on Prometheus + Grafana for now.
