global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'forrealbank-api'
    metrics_path: '/api/metrics'
    static_configs:
      # Cross-stack target: <stack>_<service>:<port>
      - targets: ['forrealbank_api:3001']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']
    dns_sd_configs:
      - names:
          - tasks.node_exporter
        type: A
        port: 9100

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    dns_sd_configs:
      - names:
          - tasks.cadvisor
        type: A
        port: 8080
