services:
  db:
    image: postgres:16
    container_name: forrealbank-db
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '5432:5432'
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4
    container_name: forrealbank-pgadmin
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    user: '0'

  api:
    image: ghcr.io/wixkun/forrealbank/api:latest
    container_name: forrealbank-api
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/wixkun/forrealbank/web:latest
    container_name: forrealbank-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      API_URL: http://api:3001/api

  prometheus:
    image: prom/prometheus:latest
    container_name: forrealbank-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: forrealbank-grafana
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus

volumes:
  dbdata:
  pgadmin_data:
  prometheus_data:
  grafana_data:
