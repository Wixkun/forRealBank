version: "3.9"
services:
  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP first: TLS routing can be added later with certificates.
      - --api.dashboard=true
      - --accesslog=true
      - --log.level=INFO
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    volumes:
      # Read-only Docker socket so Traefik can discover Swarm services and labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 30s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

networks:
  public:
    # Shared external overlay network used by proxy + app stacks.
    # Create once on Swarm manager: docker network create --driver overlay --attachable public
    external: true
    name: public

# App services (web, api) are intentionally not defined here.
# They will later need Traefik labels in docker-stack.app.yml, for example:
# - traefik.enable=true
# - traefik.http.routers.<service>.rule=Host(...) && PathPrefix(...)
# - traefik.http.services.<service>.loadbalancer.server.port=<container-port>
# - traefik.docker.network=public